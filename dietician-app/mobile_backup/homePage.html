<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet"/>
<title>Home Screen Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Google Sans', sans-serif;
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  .phone {
    width: 375px; height: 812px;
    border-radius: 50px; overflow: hidden; position: relative;
    background:
      radial-gradient(ellipse at 75% 2%, #7ec8e3 0%, transparent 45%),
      radial-gradient(ellipse at 10% 95%, #38d9a9 0%, transparent 45%),
      linear-gradient(155deg, #4040c0 0%, #7755bb 35%, #9966cc 60%, #55b8cc 100%);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }
  .scroll {
    height: 100%; overflow-y: auto; padding-bottom: 95px; scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* Header */
  .hdr { display: flex; align-items: center; justify-content: space-between; padding: 58px 20px 16px; }
  .hdr-left { display: flex; align-items: center; gap: 12px; }
  .av-wrap { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
  .av-img { width: 58px; height: 58px; border-radius: 50%; overflow: hidden; border: 2.5px solid rgba(255,255,255,0.5); }
  .av-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #3dd68c; border-radius: 50%; border: 2.5px solid white; }
  .greet-col { display: flex; flex-direction: column; }
  .greet-sub { font-size: 13px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #f5c842; line-height: 1; margin-bottom: 2px; }
  .greet-name { font-size: 36px; font-weight: 900; color: rgba(220,235,255,0.95); letter-spacing: -0.03em; line-height: 1.1; }
  .bell-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.95); box-shadow: 0 4px 16px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* Goal card */
  .goal-card { margin: 0 16px 20px; padding: 18px 20px 22px; background: rgba(210,210,255,0.22); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.3); border-radius: 24px; }
  .goal-eyebrow { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #5db8d8; margin-bottom: 10px; }
  .goal-title { font-size: 34px; font-weight: 900; letter-spacing: -0.03em; background: linear-gradient(135deg, #e0eaff 0%, #a5c8ff 50%, #c4b5fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  /* Section title */
  .sec-title { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.02em; padding: 0 18px; margin-bottom: 14px; }

  /* Nutrition */
  .nut-card { margin: 0 16px 22px; padding: 14px; background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.25); border-radius: 22px; display: flex; gap: 8px; }
  .nut-stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 12px 4px; border-radius: 16px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
  .nut-accent { width: 20px; height: 3px; border-radius: 2px; margin-bottom: 4px; }
  .nut-val { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.03em; line-height: 1; }
  .nut-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  /* Meal */
  .meal-card { margin: 0 16px; padding: 18px 16px 16px; background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.32); border-radius: 24px; }
  .meal-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .meal-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .meal-info { flex: 1; }
  .meal-name { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.02em; }
  .meal-kcal { font-size: 12.5px; font-weight: 600; color: #7dd4f8; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .meal-dot { width: 6px; height: 6px; border-radius: 50%; background: #7dd4f8; flex-shrink: 0; display: inline-block; }
  .macro-row { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
  .mtag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 7px; white-space: nowrap; letter-spacing: 0.01em; }
  .mtag-p { background: rgba(60,210,110,0.22); color: #5dffaa; border: 1px solid rgba(60,210,110,0.3); }
  .mtag-c { background: rgba(255,190,50,0.22); color: #ffd46e; border: 1px solid rgba(255,190,50,0.3); }
  .mtag-f { background: rgba(255,80,110,0.22); color: #ff9ab0; border: 1px solid rgba(255,80,110,0.3); }
  .food-list { display: flex; flex-direction: column; gap: 9px; }
  .food-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.55); border-radius: 16px; padding: 13px 16px; }
  .food-left { display: flex; align-items: center; gap: 10px; }
  .food-bullet { width: 8px; height: 8px; border-radius: 50%; background: #5588cc; flex-shrink: 0; }
  .food-name { font-size: 15px; font-weight: 700; color: #111; letter-spacing: -0.01em; }
  .food-qty { font-size: 14px; font-weight: 400; color: rgba(0,0,0,0.45); }
  .food-kcal { font-size: 13px; font-weight: 700; color: #111; background: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.5); border-radius: 10px; padding: 5px 12px; }

  /* Nav */
  .nav-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 66px; border-radius: 33px; z-index: 10; background: rgba(255,255,255,0.22); backdrop-filter: blur(24px) saturate(160%); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 6px 24px rgba(0,0,0,0.18); display: flex; align-items: center; justify-content: space-around; padding: 0 12px; }
  .nav-item { display: flex; align-items: center; justify-content: center; cursor: pointer; flex: 1; height: 100%; }
  .home-pill { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.55); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.6); border-radius: 22px; padding: 9px 18px; }
  .home-label { font-size: 13px; font-weight: 800; color: #000; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">

    <!-- Header -->
    <div class="hdr">
      <div class="hdr-left">
        <div class="av-wrap">
          <div class="av-img">
            <svg width="58" height="58" viewBox="0 0 58 58" fill="none">
              <defs><linearGradient id="avbg" x1="0" y1="0" x2="58" y2="58" gradientUnits="userSpaceOnUse"><stop stop-color="#f0d9b8"/><stop offset="1" stop-color="#c4864a"/></linearGradient></defs>
              <rect width="58" height="58" fill="url(#avbg)"/>
              <ellipse cx="29" cy="57" rx="18" ry="9" fill="#5aab95"/>
              <rect x="23" y="42" width="12" height="10" rx="4" fill="#c4864a"/>
              <ellipse cx="29" cy="24" rx="12" ry="13" fill="#d09050"/>
              <ellipse cx="17.5" cy="24" rx="2.2" ry="3" fill="#c07840"/>
              <ellipse cx="40.5" cy="24" rx="2.2" ry="3" fill="#c07840"/>
              <path d="M17 16 Q29 9 41 16 Q41 10 29 9 Q17 9 17 16Z" fill="#1a1008"/>
              <ellipse cx="29" cy="35" rx="8.5" ry="5" fill="#1a1008" opacity="0.75"/>
              <ellipse cx="29" cy="38" rx="6" ry="3" fill="#1a1008" opacity="0.6"/>
              <rect x="18" y="21" width="9" height="6" rx="3" fill="none" stroke="#111" stroke-width="1.5"/>
              <rect x="31" y="21" width="9" height="6" rx="3" fill="none" stroke="#111" stroke-width="1.5"/>
              <line x1="27" y1="24" x2="31" y2="24" stroke="#111" stroke-width="1.4"/>
              <line x1="15.5" y1="23.5" x2="18" y2="23.5" stroke="#111" stroke-width="1.2"/>
              <line x1="40" y1="23.5" x2="43" y2="23.5" stroke="#111" stroke-width="1.2"/>
            </svg>
          </div>
          <div class="av-dot"></div>
        </div>
        <div class="greet-col">
          <span class="greet-sub">Good Evening</span>
          <span class="greet-name">Samarjit</span>
        </div>
      </div>
      <div class="bell-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5544aa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
    </div>

    <!-- Goal card -->
    <div class="goal-card">
      <div class="goal-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5db8d8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
        Current Goal
      </div>
      <div class="goal-title">Weight Gain</div>
    </div>

    <!-- Today's Nutrition -->
    <div class="sec-title" style="margin-top:4px">Today's Nutrition</div>
    <div class="nut-card">
      <div class="nut-stat">
        <div class="nut-accent" style="background:#6faeff"></div>
        <span class="nut-val">333</span>
        <span class="nut-label">Calories</span>
      </div>
      <div class="nut-stat">
        <div class="nut-accent" style="background:#4ddba0"></div>
        <span class="nut-val">8g</span>
        <span class="nut-label">Protein</span>
      </div>
      <div class="nut-stat">
        <div class="nut-accent" style="background:#ffc84a"></div>
        <span class="nut-val">63g</span>
        <span class="nut-label">Carbs</span>
      </div>
      <div class="nut-stat">
        <div class="nut-accent" style="background:#ff7096"></div>
        <span class="nut-val">2g</span>
        <span class="nut-label">Fats</span>
      </div>
    </div>

    <!-- Upcoming Meal -->
    <div class="sec-title">Upcoming Meal</div>
    <div class="meal-card">
      <div class="meal-top">
        <div class="meal-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3v7"/>
          </svg>
        </div>
        <div class="meal-info">
          <div class="meal-name">Lunch</div>
          <div class="meal-kcal"><span class="meal-dot"></span> 333 kcal total</div>
        </div>
        <div class="macro-row">
          <span class="mtag mtag-p">P · 8g</span>
          <span class="mtag mtag-c">C · 63g</span>
          <span class="mtag mtag-f">F · 2g</span>
        </div>
      </div>
      <div class="food-list">
        <div class="food-row">
          <div class="food-left">
            <div class="food-bullet"></div>
            <span class="food-name">Bajra Roti <span class="food-qty">(2pcs)</span></span>
          </div>
          <span class="food-kcal">220 kcal</span>
        </div>
        <div class="food-row">
          <div class="food-left">
            <div class="food-bullet"></div>
            <span class="food-name">Boiled Potato <span class="food-qty">(200g)</span></span>
          </div>
          <span class="food-kcal">113 kcal</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Nav -->
  <div class="nav-bar">
    <div class="nav-item">
      <div class="home-pill">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#000" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="home-label">Home</span>
      </div>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(40,40,80,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(40,40,80,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
