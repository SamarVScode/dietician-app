<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<title>Login Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Google Sans', sans-serif;
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }

  .phone {
    width: 375px; height: 812px;
    border-radius: 50px; overflow: hidden; position: relative;
    background:
      radial-gradient(ellipse at 75% 2%, #7ec8e3 0%, transparent 45%),
      radial-gradient(ellipse at 10% 95%, #38d9a9 0%, transparent 45%),
      linear-gradient(155deg, #4040c0 0%, #7755bb 35%, #9966cc 60%, #55b8cc 100%);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }

  /* Top section */
  .top {
    position: relative;
    flex: 0 0 310px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
    padding-top: 20px;
  }

  .top::before {
    content: '';
    position: absolute;
    width: 280px; height: 280px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    top: 50%; left: 55%; transform: translate(-50%, -50%);
  }
  .top::after {
    content: '';
    position: absolute;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    top: 8%; left: 5%;
  }

  .app-icon {
    position: relative; z-index: 1;
    width: 88px; height: 88px; border-radius: 24px;
    background: rgba(90,75,195,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  .app-name {
    position: relative; z-index: 1;
    font-size: 32px; font-weight: 700; color: #fff;
    letter-spacing: -0.02em; margin-bottom: 8px;
  }

  .app-tagline {
    position: relative; z-index: 1;
    font-size: 14px; color: rgba(255,255,255,0.5);
  }

  /* Bottom sheet — light frosted */
  .sheet {
    flex: 1;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 28px 28px 0 0;
    padding: 12px 28px 28px;
    display: flex; flex-direction: column;
  }

  .sheet-handle {
    width: 40px; height: 4px;
    background: rgba(0,0,0,0.12); border-radius: 2px;
    margin: 0 auto 24px;
  }

  .welcome-title {
    font-size: 28px; font-weight: 700; color: #111;
    letter-spacing: -0.02em; margin-bottom: 5px;
  }

  .welcome-sub {
    font-size: 15px; color: rgba(0,0,0,0.5); font-weight: 400; margin-bottom: 26px;
  }

  .field-label {
    font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.7); margin-bottom: 8px;
  }

  .field {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    padding: 14px 16px; margin-bottom: 16px;
  }

  .field input {
    flex: 1; border: none; background: transparent;
    font-family: 'Google Sans', sans-serif;
    font-size: 15px; color: #111; outline: none;
  }
  .field input::placeholder { color: rgba(0,0,0,0.3); }

  .signin-row {
    display: flex; justify-content: flex-end; margin-top: 6px;
  }

  .signin-btn {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #4a3dd8 0%, #5b4ef5 100%);
    border-radius: 50px;
    padding: 11px 14px 11px 22px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(80,60,220,0.35);
  }

  .signin-label {
    font-size: 15px; font-weight: 700; color: #fff;
    letter-spacing: 0.01em;
  }

  .signin-arrow {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .footer {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: auto; padding-top: 16px;
    font-size: 12px; color: rgba(0,0,0,0.45); font-weight: 500;
  }
</style>
</head>
<body>
<div class="phone">

  <!-- Top -->
  <div class="top">
    <div class="app-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <path d="M24 10c0 0 1-4 5-5-1 3-2 5-5 5z" fill="white" opacity="0.9"/>
        <path d="M24 12c-7 0-12 6-12 13 0 8 5 14 10 14 2 0 3.5-1 5-1s3 1 5 1c5 0 9-7 9-14C41 18 36 12 24 12z" fill="white"/>
      </svg>
    </div>
    <div class="app-name">DietPlan</div>
    <div class="app-tagline">Your personalized nutrition companion</div>
  </div>

  <!-- Sheet -->
  <div class="sheet">
    <div class="sheet-handle"></div>

    <div class="welcome-title">Welcome back</div>
    <div class="welcome-sub">Sign in to access your plan</div>

    <div class="field-label">Email or User ID</div>
    <div class="field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" placeholder="e.g. john@mail.com or USR001"/>
    </div>

    <div class="field-label">Password</div>
    <div class="field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" placeholder="Enter your password"/>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>

    <div class="signin-row">
      <div class="signin-btn">
        <span class="signin-label">Sign In</span>
        <div class="signin-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="footer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Secured with Firebase Authentication
    </div>
  </div>

</div>
</body>
</html>
